name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOCKER_IMAGE: hanxi/tracely
  VERSION_TAG: hanxi/tracely:${{ github.ref_name }}
  LATEST_TAG: hanxi/tracely:latest

permissions:
  contents: write
  id-token: write

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version info
        id: version_info
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            echo "build_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            echo "build_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          fi

      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.VERSION_TAG }}"
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            TAGS="${TAGS},${{ env.LATEST_TAG }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      # 构建多平台镜像并推送到 Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version_info.outputs.version }}
            GIT_COMMIT=${{ steps.version_info.outputs.git_commit }}
            BUILD_TIME=${{ steps.version_info.outputs.build_time }}

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            RELEASE_NAME="v${VERSION}"
            IS_PRERELEASE=false
          else
            VERSION=${GITHUB_REF_NAME}
            RELEASE_NAME="${VERSION}"
            IS_PRERELEASE=true
          fi

          # 自动生成更新内容（基于 commit log）
          CHANGELOG=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" 2>/dev/null || git log --pretty=format:"- %s" -10)
          
          cat > /tmp/release_body.md << EOF
          ## 更新内容

          ${CHANGELOG}
          EOF

          # 检查 Release 是否已存在
          if gh release view "${VERSION}" &>/dev/null; then
            echo "Release ${VERSION} exists, updating..."
            gh release edit "${VERSION}" \
              --prerelease=${IS_PRERELEASE} \
              --title "Tracely ${RELEASE_NAME}" \
              --notes-file /tmp/release_body.md
          else
            echo "Creating new release ${VERSION}..."
            gh release create "${VERSION}" \
              --prerelease=${IS_PRERELEASE} \
              --title "Tracely ${RELEASE_NAME}" \
              --notes-file /tmp/release_body.md
          fi