<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracely - 前端监控平台</title>
  <meta name="description" content="一个轻量级的前端监控平台，支持错误收集、用户活跃统计和数据可视化，可自托管部署。提供实时 PV/UV 统计、错误追踪、多应用管理等功能。">
  <script>
    // 防止主题切换闪屏 - 在 Vue 加载前读取并应用主题
    (function() {
      const theme = localStorage.getItem('vueuse-color-mode')
      if (theme) {
        document.documentElement.classList.add(theme === 'dark' ? 'dark' : theme === 'light' ? '' : 'system')
        if (theme === 'auto') {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (prefersDark) {
            document.documentElement.classList.add('dark')
          }
        }
      }
    })()
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
